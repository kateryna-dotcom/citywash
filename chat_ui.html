<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ביורוקרטיה סיטי וואש</title>
<style>
  :root {
    --blue-dark: #0b4f8a; --blue: #1e6fb8; --blue-light: #eaf3fb;
    --border: #d9e6f0; --text: #1c2b39;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: #f4f8fb;
  }
  .chat-wrap {
    width: 100%; height: 100vh; display: flex; flex-direction: column; background: #f4f8fb;
  }
  .header {
    background: linear-gradient(135deg, var(--blue-dark), var(--blue));
    color: #fff; padding: 16px 22px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .header-text .name { font-weight: 700; font-size: 18px; }
  .header-text .status { font-size: 14px; opacity: 0.85; }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px 16%; display: flex; flex-direction: column; gap: 8px;
  }
  .bubble {
    max-width: 68%; padding: 12px 16px; border-radius: 10px; font-size: 17px; line-height: 1.55;
    white-space: pre-wrap; animation: pop .15s ease-out;
  }
  @keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .bot { align-self: flex-start; background: #fff; border: 1px solid var(--border); color: var(--text); }
  .user { align-self: flex-end; background: var(--blue); color: #fff; }
  .hint { align-self: flex-start; color: #5b7186; font-size: 13.5px; padding: 0 14px; max-width: 68%; }
  .quick-replies { display: flex; gap: 8px; flex-wrap: wrap; align-self: flex-end; justify-content: flex-end; margin: 4px 0; max-width: 90%; }
  .quick-replies button {
    background: #fff; border: 1px solid var(--blue); color: var(--blue-dark); border-radius: 16px;
    padding: 8px 16px; font-size: 15px; cursor: pointer; font-weight: 600;
  }
  .quick-replies button:hover { background: var(--blue-light); }
  .input-row {
    flex-shrink: 0; display: flex; gap: 10px; padding: 14px 16%; background: #fff; border-top: 1px solid var(--border);
  }
  .input-row input[type=text] {
    flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 11px 18px; font-size: 16px; outline: none;
  }
  .input-row input[type=text]:focus { border-color: var(--blue); }
  .input-row button {
    background: var(--blue); color: white; border: none; border-radius: 50%;
    width: 42px; height: 42px; font-size: 17px; cursor: pointer; flex-shrink: 0;
  }
  .input-row button:hover { background: var(--blue-dark); }
  .input-row button:disabled { opacity: 0.4; cursor: default; }
  .download-btn {
    align-self: flex-start; background: var(--blue); color: white; text-decoration: none;
    padding: 11px 18px; border-radius: 8px; font-size: 16px; display: inline-block; margin-top: 4px; font-weight: 600;
  }
  .download-btn:hover { background: var(--blue-dark); }
  .typing { align-self: flex-start; color: #5b7186; font-size: 14px; padding: 4px 14px; }
  @media (max-width: 900px) {
    .messages, .input-row { padding-left: 5%; padding-right: 5%; }
  }
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="header">
    <div class="avatar">📁</div>
    <div class="header-text">
      <div class="name">ביורוקרטיה סיטי וואש</div>
      <div class="status">בוט ליצירת מסמכי כוח אדם</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-row" id="inputRow">
    <input type="text" id="textInput" placeholder="הקלד/י תשובה..." autocomplete="off">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const CONTRACT_TYPES = ["contract_manager", "contract_worker"];
const SMS_SIGNABLE_DOC_TYPES = ["contract_manager", "contract_worker", "termination", "hearing", "confirmation"];
const SEP = ","; // separator used inside a grouped (multi-field) answer

// The 7 companies the bot can generate documents for. Picked as the very
// first question; name + ח.פ. are then auto-filled into every document.
const COMPANIES = [
  { name: "יו.בי.אר. שטיפת רכב בע\"מ", id: "516770773" },
  { name: "א.ב.י. שטיפת רכב בע\"מ", id: "516090289" },
  { name: "בי. יו. אי. שטיפת רכבים", id: "516975687" },
  { name: "א.א. רכב ורכב בע\"מ", id: "517118485" },
  { name: "ג'יקובס שירותי רכב בע\"מ", id: "516774312" },
  { name: "רמי מרדכייב בע\"מ", id: "516518289" },
  { name: "א.ב.ת. שירותי שטיפה בע\"מ", id: "514896737" },
];

// Every doc type has a "steps" list. Step kinds:
//   group  - several free-text fields answered in ONE message, separated by SEP
//   date   - one date field, with a "today" quick-reply shortcut
//   choice - one field answered via quick-reply buttons only
//   text   - one free-text field
const DOC_TYPES = {
  contract_manager: {
    label: "📝 חוזה עבודה – מנהל/ת תחנה",
    steps: [
      { kind: "group", fields: [
          { key: "EMPLOYEE_NAME", label: "שם העובד/ת המלא" },
          { key: "EMPLOYEE_ID", label: "מספר ת.ז. או דרכון" },
          { key: "STATION_NAME", label: "תחנה" },
        ] },
      { kind: "date", key: "START_DATE", text: "תאריך תחילת עבודה?" },
      { kind: "choice", key: "PAY_TYPE", text: "סוג שכר?", choices: [["חודשי","monthly"],["שעתי","hourly"]] },
      { kind: "text", key: "AMOUNT", text: "סכום השכר בש\"ח?" },
    ],
  },
  contract_worker: {
    label: "📝 חוזה עבודה – עובד/ת",
    steps: [
      { kind: "group", fields: [
          { key: "EMPLOYEE_NAME", label: "שם העובד/ת המלא" },
          { key: "EMPLOYEE_ID", label: "מספר ת.ז. או דרכון" },
          { key: "JOB_TITLE", label: "תפקיד (למשל: עובד ניגוב, מפעיל מכונה)" },
          { key: "STATION_NAME", label: "תחנה" },
        ] },
      { kind: "date", key: "START_DATE", text: "תאריך תחילת עבודה?" },
      { kind: "choice", key: "SCHEDULE_TYPE", text: "איזו משמרת?", choices: [["משרה קבועה (א׳-ה׳ 08:00-18:00, ו׳ 08:00-15:00)","fixed"],["משמרות (גמיש)","shift"]] },
      { kind: "choice", key: "PAY_TYPE", text: "סוג שכר?", choices: [["חודשי","monthly"],["שעתי","hourly"]] },
      { kind: "text", key: "AMOUNT", text: "סכום השכר בש\"ח?" },
    ],
  },
  termination: {
    label: "📄 מכתב פיטורים",
    steps: [
      { kind: "group", fields: [
          { key: "EMPLOYEE_NAME", label: "שם העובד/ת המלא (ל'לכבוד')" },
          { key: "EMPLOYEE_FIRST_NAME", label: "שם פרטי בלבד (לפנייה 'שלום ___')" },
          { key: "EMPLOYEE_ID", label: "מספר ת.ז." },
        ] },
      { kind: "date", key: "LETTER_DATE", text: "תאריך המכתב?" },
      { kind: "group", fields: [
          { key: "HEARING_DATE", label: "תאריך השימוע שנערך" },
          { key: "TERMINATION_DATE", label: "תאריך סיום ההעסקה בפועל" },
        ] },
    ],
  },
  hearing: {
    label: "📋 הזמנה לשימוע",
    steps: [
      { kind: "group", fields: [
          { key: "EMPLOYEE_NAME", label: "שם העובד/ת" },
          { key: "HEARING_TIME", label: "שעת השימוע" },
          { key: "STATION_MANAGER_NAME", label: "שם מנהל/ת התחנה (חותם/ת המכתב)" },
        ] },
      { kind: "date", key: "LETTER_DATE", text: "תאריך המכתב?" },
      { kind: "date", key: "HEARING_DATE", text: "תאריך השימוע?" },
      { kind: "text", key: "REASON", text: "מה הסיבות לזימון לשימוע? (אפשר כמה סיבות, מופרדות ב-\";\" — כל אחת תופיע כשורה נפרדת במכתב)" },
    ],
  },
  confirmation: {
    label: "✅ אישור העסקה",
    steps: [
      { kind: "group", fields: [
          { key: "EMPLOYEE_NAME", label: "שם העובד/ת" },
          { key: "EMPLOYEE_ID", label: "מספר ת.ז." },
          { key: "STATION_NAME", label: "תחנה" },
        ] },
      { kind: "date", key: "LETTER_DATE", text: "תאריך המכתב?" },
      { kind: "date", key: "START_DATE", text: "תאריך תחילת עבודה?" },
    ],
  },
  safety: {
    label: "🦺 הצהרת בטיחות",
    steps: [
      { kind: "group", fields: [
          { key: "EMPLOYEE_NAME", label: "שם העובד/ת" },
          { key: "EMPLOYEE_ID", label: "מספר ת.ז." },
        ] },
      { kind: "date", key: "SIGN_DATE", text: "תאריך החתימה?" },
    ],
  },
  incident_notice: {
    label: "🚗 הודעה על אירוע/נזק לביטוח",
    steps: [
      { kind: "group", fields: [
          { key: "BRANCH_NAME", label: "באיזה סניף קרה האירוע" },
          { key: "CAR_PLATE", label: "מספר רכב הלקוח שנפגע" },
          { key: "DAMAGED_PROPERTY", label: "מה ניזוק (למשל: מברשת שטיפה)" },
        ] },
      { kind: "date", key: "INCIDENT_DATE", text: "באיזה תאריך קרה האירוע?" },
      { kind: "group", fields: [
          { key: "INCIDENT_STREET", label: "רחוב (כתובת מקום האירוע)" },
          { key: "INCIDENT_NUMBER", label: "מספר בית" },
          { key: "INCIDENT_CITY", label: "עיר" },
        ] },
      { kind: "text", key: "INCIDENT_DESCRIPTION", text: "תארי בכמה מילים מה קרה (מה גרם לנזק)?" },
    ],
  },
};

const messagesEl = document.getElementById("messages");
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");
const inputRow = document.getElementById("inputRow");

let docType = null;
let step = 0;
let data = {};
let groupFilled = 0; // how many fields of the current "group" step are already answered

function todayStr() {
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
}

function addBubble(text, who) {
  const div = document.createElement("div");
  div.className = "bubble " + who;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addHint(text) {
  const div = document.createElement("div");
  div.className = "hint";
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addQuickReplies(options, onPick) {
  const wrap = document.createElement("div");
  wrap.className = "quick-replies";
  options.forEach(([label, value]) => {
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.onclick = () => { wrap.remove(); onPick(label, value); };
    wrap.appendChild(btn);
  });
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function botSay(text, delay=400) {
  return new Promise(resolve => {
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "מקליד/ה...";
    messagesEl.appendChild(typing);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    setTimeout(() => {
      typing.remove();
      addBubble(text, "bot");
      resolve();
    }, delay);
  });
}

async function start() {
  inputRow.style.display = "none";
  await botSay("שלום! כאן ביורוקרטיה סיטי וואש 📁 קודם כל, איזו חברה?", 300);
  const options = COMPANIES.map(c => [c.name, c]);
  addQuickReplies(options, (label, company) => {
    data.COMPANY_NAME = company.name;
    data.COMPANY_ID = company.id;
    addBubble(label, "user");
    askDocType();
  });
}

async function askDocType() {
  await botSay("איזה מסמך תרצי ליצור?");
  const options = Object.entries(DOC_TYPES).map(([key, cfg]) => [cfg.label, key]);
  addQuickReplies(options, (label, key) => {
    docType = key;
    step = 0;
    groupFilled = 0;
    addBubble(label, "user");
    askCurrentStep();
  });
}

function currentSteps() {
  return DOC_TYPES[docType].steps;
}

async function askCurrentStep() {
  const s = currentSteps()[step];
  if (s.kind === "group") {
    const remaining = s.fields.slice(groupFilled);
    const listText = remaining.map((f, i) => `${i+1}. ${f.label}`).join("\n");
    await botSay(listText);
    addHint(`אפשר לשלוח הכל בהודעה אחת (מופרד ב-"${SEP}"), או פריט אחד בכל הודעה — איך שנוח לך.`);
    inputRow.style.display = "flex";
    textInput.focus();
  } else if (s.kind === "choice") {
    await botSay(s.text);
    inputRow.style.display = "none";
    addQuickReplies(s.choices, (label, value) => {
      inputRow.style.display = "flex";
      handleSingleAnswer(s.key, label, value);
    });
  } else if (s.kind === "date") {
    await botSay(s.text);
    inputRow.style.display = "flex";
    addQuickReplies([["📅 היום (" + todayStr() + ")", todayStr()]], (label, value) => {
      handleSingleAnswer(s.key, value);
    });
    textInput.focus();
  } else {
    await botSay(s.text);
    inputRow.style.display = "flex";
    textInput.focus();
  }
}

function advanceStep() {
  step++;
  groupFilled = 0;
  if (step < currentSteps().length) {
    askCurrentStep();
  } else {
    showSummary();
  }
}

function handleSingleAnswer(key, displayText, storedValue) {
  addBubble(displayText, "user");
  data[key] = storedValue !== undefined ? storedValue : displayText;
  advanceStep();
}

// Accepts either "value1, value2, value3" in one message, or one value per
// message sent in order — whichever the person finds more natural.
function splitGroupAnswer(raw) {
  const stripNumbering = s => s.replace(/^\s*\d+[.)]\s*/, "").trim();
  let lines = raw.split("\n").map(stripNumbering).filter(x => x.length > 0);
  if (lines.length > 1) return lines;
  return raw.split(SEP).map(stripNumbering).filter(x => x.length > 0);
}

async function handleGroupAnswer(rawText) {
  addBubble(rawText, "user");
  const s = currentSteps()[step];
  const remaining = s.fields.slice(groupFilled);
  const parts = splitGroupAnswer(rawText);

  const take = Math.min(parts.length, remaining.length);
  for (let i = 0; i < take; i++) {
    data[remaining[i].key] = parts[i];
  }
  groupFilled += take;

  if (groupFilled >= s.fields.length) {
    advanceStep();
  } else {
    const stillNeeded = s.fields.slice(groupFilled);
    await botSay("קיבלתי. נשארו עוד:\n" + stillNeeded.map((f, i) => `${i+1}. ${f.label}`).join("\n"));
  }
}

function fieldLabel(key) {
  for (const s of currentSteps()) {
    if (s.kind === "group") {
      const f = s.fields.find(f => f.key === key);
      if (f) return f.label;
    } else if (s.key === key) {
      return s.text.replace(/\?$/, "");
    }
  }
  return key;
}

async function showSummary() {
  let lines = ["בדוק/י שהפרטים נכונים:", `חברה: ${data.COMPANY_NAME}`];
  for (const s of currentSteps()) {
    const keys = s.kind === "group" ? s.fields.map(f => f.key) : [s.key];
    for (const key of keys) {
      let val = data[key];
      if (s.kind === "choice") {
        const found = s.choices.find(([label, value]) => value === val);
        val = found ? found[0] : val;
      }
      lines.push(`${fieldLabel(key)}: ${val}`);
    }
  }
  if (CONTRACT_TYPES.includes(docType)) {
    lines.push("", "🦺 הצהרת הבטיחות תצורף אוטומטית לאותו PDF.");
  }
  await botSay(lines.join("\n"), 300);
  inputRow.style.display = "none";
  addQuickReplies([["✅ כן, צור מסמך","yes"],["❌ לא, בטל","no"]], async (label, value) => {
    if (value === "yes") {
      await generateDocument();
    } else {
      await botSay("בוטל. רענן/י את הדף כדי להתחיל שוב.");
    }
  });
}

let awaitingPhoneNumber = false;

async function generateDocument() {
  await botSay("רגע, מכין/ה את המסמך...", 200);
  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ doc_type: docType, fields: data }),
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const div = document.createElement("div");
    div.className = "bubble bot";
    const fname = `${docType}_${data.EMPLOYEE_NAME || data.BRANCH_NAME || "document"}.pdf`;
    const readyText = CONTRACT_TYPES.includes(docType) ? "החוזה + הצהרת הבטיחות מוכנים (קובץ אחד)!" : "המסמך מוכן!";
    div.innerHTML = `${readyText} <br><a class="download-btn" href="${url}" download="${fname}">⬇️ הורד/י PDF</a>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    if (SMS_SIGNABLE_DOC_TYPES.includes(docType)) {
      await botSay("אפשר גם לשלוח את המסמך לחתימה דיגיטלית ב-SMS. רוצה?", 400);
      inputRow.style.display = "none";
      addQuickReplies([["📲 כן, שלח/י לחתימה ב-SMS","yes"],["לא תודה","no"]], async (label, value) => {
        if (value === "yes") {
          await botSay("מה מספר הטלפון של החותם/ת?");
          inputRow.style.display = "flex";
          awaitingPhoneNumber = true;
          textInput.focus();
        } else {
          await botSay("בסדר. רוצה ליצור עוד מסמך? רענן/י את הדף.", 300);
        }
      });
    } else {
      await botSay("רוצה ליצור עוד מסמך? רענן/י את הדף.", 400);
    }
  } catch (e) {
    await botSay("שגיאה ביצירת המסמך: " + e.message);
  }
}

async function sendForSmsSignature(phone) {
  addBubble(phone, "user");
  await botSay("שולח/ת לחתימה...", 200);
  try {
    const res = await fetch("/api/send-for-signature", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ doc_type: docType, fields: data, phone }),
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText);
    }
    await botSay("נשלח! החותם/ת יקבל/תקבל SMS עם קישור לחתימה.", 300);
  } catch (e) {
    await botSay("שגיאה בשליחה לחתימה: " + e.message);
  }
  await botSay("רוצה ליצור עוד מסמך? רענן/י את הדף.", 400);
}

sendBtn.onclick = () => {
  const val = textInput.value.trim();
  if (!val) return;
  textInput.value = "";
  if (awaitingPhoneNumber) {
    awaitingPhoneNumber = false;
    sendForSmsSignature(val);
    return;
  }
  const s = currentSteps()[step];
  if (s.kind === "group") {
    handleGroupAnswer(val);
  } else {
    handleSingleAnswer(s.key, val);
  }
};
textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendBtn.click();
});

start();
</script>
</body>
</html>
