<head>

<title>התחברות - Express City Wash</title>
<style>
  :root { --blue-dark: #0b4f8a; --blue: #1e6fb8; --border: #d9e6f0; --text: #1c2b39; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, var(--blue-dark), var(--blue));
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 14px; padding: 36px 32px; width: 340px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center;
  }
  .card img { width: 100%; max-width: 190px; margin-bottom: 22px; }
  .card h1 { font-size: 17px; color: var(--blue-dark); margin: 0 0 22px; }
  .card input {
    width: 100%; padding: 11px 12px; margin-bottom: 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14.5px; outline: none;
  }
  .card input:focus { border-color: var(--blue); }
  .card button {
    width: 100%; padding: 11px; background: var(--blue); color: #fff; border: none;
    border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600; margin-top: 6px;
  }
  .card button:hover { background: var(--blue-dark); }
  .error { color: #d92b2b; font-size: 13.5px; margin-bottom: 10px; }
</style>
