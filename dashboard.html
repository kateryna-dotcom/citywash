<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express City Wash - פאנל ניהול</title>
<style>
  :root {
    --blue-dark: #0b4f8a;
    --blue: #1e6fb8;
    --blue-light: #eaf3fb;
    --blue-accent: #3aa0d8;
    --red: #d92b2b;
    --text: #1c2b39;
    --border: #d9e6f0;
    --sidebar-w: 230px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: #f4f8fb; color: var(--text); height: 100vh; overflow: hidden;
  }
  .layout { display: flex; height: 100vh; }
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0; background: linear-gradient(180deg, var(--blue-dark), var(--blue));
    color: #fff; display: flex; flex-direction: column; padding: 20px 0;
  }
  .sidebar .logo-wrap {
    background: #fff; margin: 0 16px 24px; border-radius: 10px; padding: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebar .logo-wrap img { width: 100%; max-width: 170px; display: block; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 13px 20px; cursor: pointer;
    font-size: 15px; color: #eaf3fb; border-right: 3px solid transparent; transition: background .15s;
  }
  .nav-item .emoji { font-size: 18px; }
  .nav-item:hover { background: rgba(255,255,255,0.08); }
  .nav-item.active { background: rgba(255,255,255,0.16); border-right-color: #fff; font-weight: 600; }
  .sidebar-footer { margin-top: auto; padding: 14px 20px; font-size: 12.5px; color: #cfe4f5; }
  .sidebar-footer a { color: #fff; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    background: #fff; border-bottom: 1px solid var(--border); padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .topbar h1 { font-size: 18px; margin: 0; color: var(--blue-dark); }
  .content { flex: 1; overflow: hidden; position: relative; }
  .pane { position: absolute; inset: 0; display: none; }
  .pane.active { display: block; }
  .pane iframe { width: 100%; height: 100%; border: none; }
  .placeholder-wrap {
    height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  }
  .placeholder-wrap .icon { font-size: 52px; }
  .placeholder-wrap h2 { color: var(--blue-dark); margin: 0; }
  .placeholder-wrap p { color: #5b7186; max-width: 380px; text-align: center; margin: 0; }
  .badge-soon {
    background: var(--blue-light); color: var(--blue-dark); padding: 4px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
  }
</style>
</head>
